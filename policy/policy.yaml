version: "1.0"
metadata:
  name: "SafeAgent Policy "
  description: "Rules for prompt injection and sanitization"

block:
  - name: "prompt_injection"
    id: 4041
    pattern: "ignore\\s+all\\s+(previous)?instructions?"
    action: "block"
    weight: 1
  - name: "prompt_injection"
    id: 4042
    pattern: "(override)?\\s+system\\s+prompt"
    action: "block"
    weight: 0.9
  - name: "prompt_injection"
    id: 4043
    pattern: "(?:show|give)\\s+(me)?admin\\s+password"
    action: "block"
    weight: 0.95
  - name: "prompt_injection"
    id: 4051
    pattern: "(?:show|give)(?:\\s+me)?(?:\\s+your)?\\s+(?:databases?|passwords?)"
    action: "block"
    weight: 1
  