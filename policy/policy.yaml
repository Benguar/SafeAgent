version: "1.0"
metadata:
  name: "SafeAgent Policy "
  description: "Rules for prompt injection and sanitization"

block:
  - name: "prompt_injection"
    id: 4041
    pattern: "(ignore|forget|disregard) (all )?(the )?(previous |system )?instructions?"
    action: "block"
    weight: 1
  - name: "prompt_injection"
    id: 4042
    pattern: "(override|ignore|forget) (all )?(the )?system prompt(s)?"
    action: "block"
    weight: 0.9
  - name: "prompt_injection"
    id: 4043
    pattern: "(show|give|tell) (me )?(your )?admin passwords?"
    action: "block"
    weight: 0.95
  - name: "prompt_injection"
    id: 4051
    pattern: "(show|give|tell) (me )?(your )?(databases?|passwords?)"
    action: "block"
    weight: 1
  