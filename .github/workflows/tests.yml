name: Testing

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: benguar
          POSTGRES_PASSWORD: dummypass
          POSTGRES_DB: sdk_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql+asyncpg://benguar:dummypass@localhost:5432/sdk_agent'
      OPA_URL: 'http://localhost:8181/v1/data/safeagent/engine/block_response'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod 755 ./opa
      - name: Start OPA Server
        run: |
          ./opa run -s ./policy & 
          sleep 5
      - name: Run tests with pytest
        run: |
          pytest
